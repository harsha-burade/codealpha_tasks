<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player Pro</title>
<style>
*{box-sizing:border-box}
body {
  margin:0; font-family: Arial, sans-serif; background:#0f172a; color:#fff;
  display:flex; justify-content:center; align-items:center; height:100vh;
}
.player {
  width: 340px; background:#111827; padding:18px; border-radius:20px;
  box-shadow:0 20px 40px rgba(0,0,0,0.6);
}
.cover {
  width:100%; height:200px; border-radius:15px; object-fit:cover; margin-bottom:10px;
}
h3{margin:5px 0}
p{margin:0;color:#9ca3af}
.controls{display:flex; justify-content:center; align-items:center; gap:15px; margin:12px 0}
.controls button{
  border:none; background:#1f2937; color:#fff; padding:10px 12px; border-radius:50%; cursor:pointer;
}
.controls button:hover{background:#374151}
.big{padding:14px 16px; background:#22c55e}
.progress, .volume{width:100%}
.extra{display:flex; justify-content:space-between; margin:8px 0}
.active{background:#22c55e !important}
.playlist{margin-top:10px; max-height:120px; overflow:auto}
.playlist div{padding:6px; cursor:pointer}
.playlist div:hover{background:#1f2937}
</style>
</head>
<body>

<div class="player">
  <img id="cover" class="cover">
  <h3 id="title"></h3>
  <p id="artist"></p>

  <audio id="audio"></audio>

  <input type="range" id="progress" class="progress" value="0">
  <div class="extra">
    <span id="time">0:00</span>
    <span id="duration">0:00</span>
  </div>

  <div class="controls">
    <button onclick="toggleShuffle()">🔀</button>
    <button onclick="prevSong()">⏮</button>
    <button class="big" onclick="playPause()">⏯</button>
    <button onclick="nextSong()">⏭</button>
    <button onclick="toggleRepeat()">🔁</button>
  </div>

  <input type="range" id="volume" class="volume" min="0" max="1" step="0.01">

  <div class="playlist" id="playlist"></div>
</div>

<script>
const songs = [
  { title:"Song 1", artist:"Artist A", src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", cover:"https://picsum.photos/400?1"},
  { title:"Song 2", artist:"Artist B", src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", cover:"https://picsum.photos/400?2"},
  { title:"Song 3", artist:"Artist C", src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3", cover:"https://picsum.photos/400?3"}
];

let current=0, isShuffle=false, isRepeat=false;
const audio=document.getElementById('audio');
const title=document.getElementById('title');
const artist=document.getElementById('artist');
const cover=document.getElementById('cover');
const progress=document.getElementById('progress');
const volume=document.getElementById('volume');
const playlistDiv=document.getElementById('playlist');

function loadSong(i){
  const s=songs[i];
  title.innerText=s.title; artist.innerText=s.artist; cover.src=s.cover;
  audio.src=s.src;
}

function playPause(){ audio.paused?audio.play():audio.pause(); }

function nextSong(){
  if(isShuffle){ current=Math.floor(Math.random()*songs.length); }
  else{ current=(current+1)%songs.length; }
  loadSong(current); audio.play();
}

function prevSong(){ current=(current-1+songs.length)%songs.length; loadSong(current); audio.play(); }

function toggleShuffle(){ isShuffle=!isShuffle; event.target.classList.toggle('active'); }
function toggleRepeat(){ isRepeat=!isRepeat; event.target.classList.toggle('active'); }

audio.addEventListener('timeupdate',()=>{
  progress.value=(audio.currentTime/audio.duration)*100||0;
  document.getElementById('time').innerText=format(audio.currentTime);
  document.getElementById('duration').innerText=format(audio.duration);
});

progress.addEventListener('input',()=>{
  audio.currentTime=(progress.value/100)*audio.duration;
});

volume.addEventListener('input',()=> audio.volume=volume.value);

function format(t){ if(isNaN(t)) return '0:00'; let m=Math.floor(t/60),s=Math.floor(t%60); return m+':'+(s<10?'0':'')+s; }

songs.forEach((s,i)=>{
  let d=document.createElement('div');
  d.innerText=s.title+' - '+s.artist;
  d.onclick=()=>{ current=i; loadSong(i); audio.play(); };
  playlistDiv.appendChild(d);
});

// autoplay
audio.addEventListener('ended',()=>{
  if(isRepeat){ audio.currentTime=0; audio.play(); }
  else nextSong();
});

loadSong(0);
</script>

</body>
</html>
